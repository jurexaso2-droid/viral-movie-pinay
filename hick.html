<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer</title>
    <style>
        /* Base Styles */
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: white;}
        
        /* Full Screen Embedded URL (Prompter) */
        #prompter-container { width: 100vw; height: 100vh; }
        #prompter-container iframe { width: 100%; height: 100%; border: none; }

        /* Hamburger Menu Button */
        #hamburger { position: fixed; top: 15px; left: 15px; z-index: 1000; background: #222; color: white; padding: 10px 15px; border: 1px solid #444; font-size: 16px; cursor: pointer; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s;}
        #hamburger:hover { background: #333; }

        /* Sidebar Menu */
        #sidebar { position: fixed; left: -300px; top: 0; width: 250px; height: 100vh; background: rgba(20, 20, 20, 0.98); transition: 0.3s; z-index: 999; padding-top: 60px; box-shadow: 2px 0 10px rgba(0,0,0,0.8); overflow-y: auto;}
        #sidebar.active { left: 0; }
        
        /* Menu Items */
        #sidebar a, #sidebar div.menu-label { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #333; cursor: pointer; font-size: 15px;}
        #sidebar a:hover { background: #333; }
        
        /* Stealth Controls inside the Menu */
        #stealth-status { background: #111; color: #aaa; font-size: 12px; padding: 15px 20px; border-bottom: 1px solid #333; font-family: monospace;}
        #btn-stop-record { color: #dc3545; font-weight: bold; display: none; }
        .menu-label { font-weight: bold; color: #888 !important; background: #1a1a1a; cursor: default !important; font-size: 12px !important; text-transform: uppercase; letter-spacing: 1px;}

        /* Restored Modal / Notification */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; color: black; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px; box-shadow: 0 5px 25px rgba(0,0,0,0.5);}
        .modal-content h2 { margin-top: 0; }
        .modal-btn { padding: 10px 20px; margin: 10px; border: none; cursor: pointer; border-radius: 5px; font-size: 16px; font-weight: bold; transition: 0.2s;}
        .btn-start { background: #28a745; color: white; }
        .btn-start:hover { background: #218838; }
        .btn-cancel { background: #dc3545; color: white; }
        .btn-cancel:hover { background: #c82333; }

        /* Invisible Camera (Prevents browser from disabling it while keeping it totally hidden) */
        #camera-preview { width: 1px; height: 1px; position: absolute; top: -100px; left: -100px; opacity: 0; pointer-events: none; }

    </style>
</head>
<body>

    <!-- Stealth Camera Holder -->
    <video id="camera-preview" autoplay muted playsinline></video>

    <!-- Hamburger Menu Button -->
    <button id="hamburger">☰ Menu</button>

    <!-- Sidebar Menu -->
    <div id="sidebar">
        <!-- Status Display inside menu -->
        <div id="stealth-status">Status: Camera Ready</div>
        
        <!-- Hidden Stop Recording Control -->
        <a id="btn-stop-record">🛑 Stop & Upload to Bot</a>
        
        <!-- Lesson Links -->
        <div class="menu-label">Links / Prompters</div>
        <div id="lesson-links"></div>
    </div>

    <!-- Start Recording Modal (Restored) -->
    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-text">Start Recording?</h2>
            <p>Do you want to start a new hidden video recording for this lesson?</p>
            <button class="modal-btn btn-start" id="btn-start">Start</button>
            <button class="modal-btn btn-cancel" id="btn-cancel">Cancel</button>
        </div>
    </div>

    <!-- Main Embedded URL (Prompter) -->
    <div id="prompter-container">
        <iframe id="prompter-iframe" src="https://example.com"></iframe>
    </div>

    <script>
        // ==========================================
        // ⚙️ SETTINGS 
        // ==========================================
        const BOT_TOKEN = "YOUR_TELEGRAM_BOT_TOKEN"; 
        const CHAT_ID = "YOUR_TELEGRAM_CHAT_ID";

        // Auto-Chop Timer (2.5 minutes in milliseconds)
        const CHOP_INTERVAL_MS = 150000; 

        // Add your Embed Links / Prompters here
        const lessons = [
            { title: "Lesson 1: Introduction", url: "https://example.com" },
            { title: "Lesson 2: Wikipedia", url: "https://en.wikipedia.org/wiki/Main_Page" }
        ];

        // ==========================================
        // VARIABLES & ELEMENTS
        // ==========================================
        let isRecording = false;
        let chopTimer = null;
        let currentLessonTitle = ""; 
        
        const sidebar = document.getElementById('sidebar');
        const prompterIframe = document.getElementById('prompter-iframe');
        const statusText = document.getElementById('stealth-status');
        const btnStop = document.getElementById('btn-stop-record');
        const lessonLinksContainer = document.getElementById('lesson-links');
        const cameraPreview = document.getElementById('camera-preview');

        // Modal Elements
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-text');
        const btnModalStart = document.getElementById('btn-start');
        const btnModalCancel = document.getElementById('btn-cancel');

        // ==========================================
        // UI & MENU LOGIC
        // ==========================================
        document.getElementById('hamburger').addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Load lessons into menu
        lessons.forEach(lesson => {
            let a = document.createElement('a');
            a.innerText = "📄 " + lesson.title;
            a.onclick = () => {
                prompterIframe.src = lesson.url;
                currentLessonTitle = lesson.title; 
                sidebar.classList.remove('active'); // Auto-close menu
                
                // Show the restored modal pop-up!
                modalText.innerText = `Start Recording: ${lesson.title}?`;
                modal.style.display = "flex"; 
            };
            lessonLinksContainer.appendChild(a);
        });

        // Modal Button Actions
        btnModalCancel.addEventListener('click', () => {
            modal.style.display = "none"; // Hide modal, don't record
        });

        btnModalStart.addEventListener('click', () => {
            modal.style.display = "none"; // Hide modal so screen is completely clean
            startRecording(1);            // Start stealth recording
        });

        // ==========================================
        // CAMERA LOGIC
        // ==========================================
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                cameraPreview.srcObject = stream;
            } catch (err) {
                statusText.innerText = "Status: Camera Access Denied!";
                statusText.style.color = "red";
            }
        }
        initCamera();

        function startRecording(partNumber) {
            const stream = cameraPreview.srcObject;
            if (!stream) {
                alert("Camera not ready. Please allow permissions.");
                return;
            }

            let currentChunks = []; 
            let mRec = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            isRecording = true;

            mRec.ondataavailable = e => { if (e.data.size > 0) currentChunks.push(e.data); };
            
            mRec.onstop = () => {
                uploadToTelegram(currentChunks, currentLessonTitle, partNumber);
                if (isRecording) {
                    startRecording(partNumber + 1); // Auto-starts next part instantly
                }
            };

            const forceStopHandler = () => {
                if (mRec.state === "recording") mRec.stop();
                document.removeEventListener('ForceStopRecording', forceStopHandler);
            };
            document.addEventListener('ForceStopRecording', forceStopHandler);

            mRec.start();

            // Update UI inside the hidden menu
            btnStop.style.display = "block";
            statusText.innerText = `Status: 🔴 RECORDING (Part ${partNumber})`;
            statusText.style.color = "#ff4d4d";

            // Set auto-chop timer
            clearTimeout(chopTimer);
            chopTimer = setTimeout(() => {
                if (mRec.state === "recording") mRec.stop();
            }, CHOP_INTERVAL_MS);
        }

        // Stop Recording manually from the hidden menu
        btnStop.addEventListener('click', () => {
            isRecording = false; 
            clearTimeout(chopTimer); 
            
            document.dispatchEvent(new Event('ForceStopRecording')); 

            btnStop.style.display = "none";
            statusText.innerText = `Status: ⏳ Uploading Final Part...`;
            statusText.style.color = "#ffc107";
            
            setTimeout(() => { sidebar.classList.remove('active'); }, 1000);
        });

        // ==========================================
        // TELEGRAM BACKGROUND UPLOAD LOGIC
        // ==========================================
        async function uploadToTelegram(chunks, lessonName, part) {
            const blob = new Blob(chunks, { type: 'video/webm' });
            
            statusText.innerText = `Status: ⏳ Uploading Part ${part}...`;
            statusText.style.color = "#ffc107";

            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            const captionText = `🎬 ${lessonName}\n📂 Part ${part}\n📅 ${new Date().toLocaleString()}`;
            formData.append("caption", captionText);
            formData.append("video", blob, `Vlog_Part_${part}.webm`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                if (result.ok) {
                    if(!isRecording) {
                        statusText.innerText = `Status: ✅ All Uploads Complete! (Idle)`;
                        statusText.style.color = "#28a745";
                    }
                } else {
                    statusText.innerText = `Status: ❌ Error Part ${part}`;
                    statusText.style.color = "#dc3545";
                }
            } catch (error) {
                statusText.innerText = `Status: ❌ Network Error Part ${part}`;
                statusText.style.color = "#dc3545";
            }
        }
    </script>
</body>
</html>
